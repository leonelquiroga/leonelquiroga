<svg width="900" height="200" viewBox="0 0 900 200"
     xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#0D1117"/>
      <stop offset="100%" stop-color="#161B22"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   stop-color="#3B82F6"/>
      <stop offset="100%" stop-color="#8B5CF6"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <style>
      .name { font: 600 42px "Segoe UI", system-ui, sans-serif; fill: #F0F6FC; letter-spacing: -1px; }
      .role { font: 400 16px "Segoe UI", system-ui, sans-serif; fill: #8B949E; letter-spacing: .5px; }
      .loc  { font: 400 13px "Segoe UI", system-ui, sans-serif; fill: #484F58; }
      .cursor { animation: blink 1.1s step-end infinite; }
      @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0} }
    </style>
  </defs>

  <!-- background -->
  <rect width="900" height="200" fill="url(#bg)" rx="12"/>

  <!-- subtle grid -->
  <g stroke="#21262D" stroke-width="0.5" opacity="0.6">
    <line x1="0" y1="50"  x2="900" y2="50"/>
    <line x1="0" y1="100" x2="900" y2="100"/>
    <line x1="0" y1="150" x2="900" y2="150"/>
    <line x1="150" y1="0" x2="150" y2="200"/>
    <line x1="300" y1="0" x2="300" y2="200"/>
    <line x1="450" y1="0" x2="450" y2="200"/>
    <line x1="600" y1="0" x2="600" y2="200"/>
    <line x1="750" y1="0" x2="750" y2="200"/>
  </g>

  <!-- accent line top -->
  <rect x="0" y="0" width="900" height="3" fill="url(#accent)" rx="2"/>

  <!-- left accent bar -->
  <rect x="48" y="52" width="3" height="96" fill="url(#accent)" rx="2"/>

  <!-- name -->
  <text x="68" y="104" class="name">Leonel Quiroga</text>

  <!-- blinking cursor -->
  <rect x="357" y="72" width="3" height="38" fill="#3B82F6" rx="1" class="cursor"/>

  <!-- role -->
  <text x="68" y="128" class="role">Full Stack Engineer  ·  React · TypeScript · NestJS</text>

  <!-- location + status -->
  <text x="68" y="152" class="loc">Neuquén, Argentina  ·  Open to remote EU roles</text>

  <!-- right side — decorative code -->
  <g opacity="0.18" font-family="monospace" font-size="11" fill="#58A6FF">
    <text x="620" y="65">const dev = {</text>
    <text x="636" y="81">  focus: "ship &amp; simplify",</text>
    <text x="636" y="97">  arch: "clean layers",</text>
    <text x="636" y="113">  rule: "right tool,</text>
    <text x="636" y="129">        right problem",</text>
    <text x="620" y="145">}</text>
  </g>

  <!-- dot grid right -->
  <g fill="#30363D" opacity="0.5">
    <circle cx="820" cy="40"  r="2"/><circle cx="840" cy="40"  r="2"/><circle cx="860" cy="40"  r="2"/>
    <circle cx="820" cy="60"  r="2"/><circle cx="840" cy="60"  r="2"/><circle cx="860" cy="60"  r="2"/>
    <circle cx="820" cy="80"  r="2"/><circle cx="840" cy="80"  r="2"/><circle cx="860" cy="80"  r="2"/>
    <circle cx="820" cy="100" r="2"/><circle cx="840" cy="100" r="2"/><circle cx="860" cy="100" r="2"/>
    <circle cx="820" cy="120" r="2"/><circle cx="840" cy="120" r="2"/><circle cx="860" cy="120" r="2"/>
    <circle cx="820" cy="140" r="2"/><circle cx="840" cy="140" r="2"/><circle cx="860" cy="140" r="2"/>
    <circle cx="820" cy="160" r="2"/><circle cx="840" cy="160" r="2"/><circle cx="860" cy="160" r="2"/>
  </g>
</svg>